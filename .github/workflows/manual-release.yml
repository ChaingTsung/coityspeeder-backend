name: Manual Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare metadata
    runs-on: ubuntu-latest
    outputs:
      build_time: ${{ steps.meta.outputs.build_time }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Generate metadata
        id: meta
        shell: bash
        run: |
          BUILD_TIME="$(date -u +'%Y%m%d%H%M%S')"
          RELEASE_TAG="manual-${BUILD_TIME}"
          RELEASE_NAME="Manual Build ${BUILD_TIME}"

          echo "build_time=${BUILD_TIME}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

  build:
    name: Build and package (${{ matrix.os }})
    needs: prepare
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: package-linux
            backend_bin_src: target/release/coityspeeder
            backend_bin_dst: coityspeeder
            xray_local: xray
            mihomo_local: mihomo
            xray_pack: xray
            mihomo_pack: mihomo
          - os: windows-latest
            artifact_name: package-windows
            backend_bin_src: target/release/coityspeeder.exe
            backend_bin_dst: coityspeeder.exe
            xray_local: xray.exe
            mihomo_local: mihomo.exe
            xray_pack: xray.exe
            mihomo_pack: mihomo.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --locked

      - name: Generate zip filename
        id: zipmeta
        shell: bash
        run: |
          ZIP_NAME="$(node -e "console.log('${{ needs.prepare.outputs.build_time }}_' + require('node:crypto').randomUUID() + '.zip')")"
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Prepare package directory
        shell: pwsh
        run: |
          if (Test-Path release-package) {
            Remove-Item -Recurse -Force release-package
          }
          New-Item -ItemType Directory -Path release-package | Out-Null

      - name: Copy backend binary
        shell: pwsh
        run: |
          Copy-Item "${{ matrix.backend_bin_src }}" "release-package/${{ matrix.backend_bin_dst }}"

      - name: Install Linux tools
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip gzip

      - name: Check or download Xray (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ -f "./${{ matrix.xray_local }}" ]; then
            echo "Using existing ./${{ matrix.xray_local }}"
            cp "./${{ matrix.xray_local }}" "release-package/${{ matrix.xray_pack }}"
            chmod +x "release-package/${{ matrix.xray_pack }}"
            exit 0
          fi

          echo "No local xray found, downloading latest Xray release..."
          XRAY_JSON="$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/XTLS/Xray-core/releases/latest)"

          XRAY_URL="$(echo "$XRAY_JSON" | jq -r '
            [
              .assets[]
              | select(.name == "Xray-linux-64.zip")
              | .browser_download_url
            ][0] // empty
          ')"

          if [ -z "$XRAY_URL" ] || [ "$XRAY_URL" = "null" ]; then
            echo "Failed to find Xray Linux asset: Xray-linux-64.zip"
            exit 1
          fi

          curl -fL "$XRAY_URL" -o xray-linux.zip
          rm -rf xray-extract
          mkdir -p xray-extract
          unzip -q xray-linux.zip -d xray-extract

          XRAY_BIN="$(find xray-extract -type f -name 'xray' | head -n 1 || true)"
          if [ -z "$XRAY_BIN" ]; then
            echo "Downloaded Xray archive does not contain xray"
            find xray-extract -maxdepth 3 -type f || true
            exit 1
          fi

          cp "$XRAY_BIN" "release-package/${{ matrix.xray_pack }}"
          chmod +x "release-package/${{ matrix.xray_pack }}"

      - name: Check or download Mihomo (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ -f "./${{ matrix.mihomo_local }}" ]; then
            echo "Using existing ./${{ matrix.mihomo_local }}"
            cp "./${{ matrix.mihomo_local }}" "release-package/${{ matrix.mihomo_pack }}"
            chmod +x "release-package/${{ matrix.mihomo_pack }}"
            exit 0
          fi

          echo "No local mihomo found, downloading tag Prerelease-Alpha..."
          MIHOMO_JSON="$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/MetaCubeX/mihomo/releases/tags/Prerelease-Alpha)"

          MIHOMO_URL="$(echo "$MIHOMO_JSON" | jq -r '
            [
              .assets[]
              | select(.name | test("^mihomo-linux-amd64-v1-.*\\.(gz|zip)$"))
              | .browser_download_url
            ][0]
            //
            [
              .assets[]
              | select(.name | test("^mihomo-linux-amd64-compatible-.*\\.(gz|zip)$"))
              | .browser_download_url
            ][0]
            //
            [
              .assets[]
              | select(.name | test("^mihomo-linux-amd64-.*\\.(gz|zip)$"))
              | .browser_download_url
            ][0]
            // empty
          ')"

          if [ -z "$MIHOMO_URL" ] || [ "$MIHOMO_URL" = "null" ]; then
            echo "Failed to find Mihomo Linux asset from Prerelease-Alpha"
            exit 1
          fi

          case "$MIHOMO_URL" in
            *.gz)  curl -fL "$MIHOMO_URL" -o mihomo-linux.gz ;;
            *.zip) curl -fL "$MIHOMO_URL" -o mihomo-linux.zip ;;
            *) echo "Unsupported Mihomo Linux asset format"; exit 1 ;;
          esac

          rm -rf mihomo-extract
          mkdir -p mihomo-extract

          if [ -f mihomo-linux.gz ]; then
            gunzip -c mihomo-linux.gz > "mihomo-extract/mihomo"
          else
            unzip -q mihomo-linux.zip -d mihomo-extract
          fi

          MIHOMO_BIN="$(find mihomo-extract -type f \( -name 'mihomo' -o -name 'mihomo-linux*' \) | head -n 1 || true)"
          if [ -z "$MIHOMO_BIN" ]; then
            echo "Downloaded Mihomo package does not contain executable"
            find mihomo-extract -maxdepth 3 -type f || true
            exit 1
          fi

          cp "$MIHOMO_BIN" "release-package/${{ matrix.mihomo_pack }}"
          chmod +x "release-package/${{ matrix.mihomo_pack }}"

      - name: Check or download Xray (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path ".\${{ matrix.xray_local }}") {
            Write-Host "Using existing .\${{ matrix.xray_local }}"
            Copy-Item ".\${{ matrix.xray_local }}" "release-package\${{ matrix.xray_pack }}"
            exit 0
          }

          Write-Host "No local xray.exe found, downloading latest Xray release..."
          $headers = @{
            "Accept" = "application/vnd.github+json"
            "Authorization" = "Bearer ${{ github.token }}"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $release = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/XTLS/Xray-core/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -eq "Xray-windows-64.zip" } | Select-Object -First 1

          if (-not $asset) {
            throw "Failed to find Xray Windows asset: Xray-windows-64.zip"
          }

          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "xray-windows.zip"

          if (Test-Path "xray-extract") {
            Remove-Item -Recurse -Force "xray-extract"
          }
          Expand-Archive -Path "xray-windows.zip" -DestinationPath "xray-extract" -Force

          $xrayExe = Get-ChildItem -Path "xray-extract" -Recurse -File |
            Where-Object { $_.Name -ieq "xray.exe" } |
            Select-Object -First 1

          if (-not $xrayExe) {
            Get-ChildItem -Path "xray-extract" -Recurse | ForEach-Object { $_.FullName }
            throw "Downloaded Xray archive does not contain xray.exe"
          }

          Copy-Item $xrayExe.FullName "release-package\${{ matrix.xray_pack }}"

      - name: Check or download Mihomo (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path ".\${{ matrix.mihomo_local }}") {
            Write-Host "Using existing .\${{ matrix.mihomo_local }}"
            Copy-Item ".\${{ matrix.mihomo_local }}" "release-package\${{ matrix.mihomo_pack }}"
            exit 0
          }

          Write-Host "No local mihomo.exe found, downloading tag Prerelease-Alpha..."
          $headers = @{
            "Accept" = "application/vnd.github+json"
            "Authorization" = "Bearer ${{ github.token }}"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $release = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/MetaCubeX/mihomo/releases/tags/Prerelease-Alpha"

          $asset = $release.assets |
            Where-Object { $_.name -match '^mihomo-windows-amd64-v1-.*\.(zip|gz)$' } |
            Select-Object -First 1

          if (-not $asset) {
            $asset = $release.assets |
              Where-Object { $_.name -match '^mihomo-windows-amd64-compatible-.*\.(zip|gz)$' } |
              Select-Object -First 1
          }

          if (-not $asset) {
            $asset = $release.assets |
              Where-Object { $_.name -match '^mihomo-windows-amd64-.*\.(zip|gz)$' } |
              Select-Object -First 1
          }

          if (-not $asset) {
            throw "Failed to find Mihomo Windows asset from Prerelease-Alpha"
          }

          $downloadFile = "mihomo-windows-package"
          if ($asset.name -like "*.zip") {
            $downloadFile = "$downloadFile.zip"
          } elseif ($asset.name -like "*.gz") {
            $downloadFile = "$downloadFile.gz"
          } else {
            throw "Unsupported Mihomo asset format: $($asset.name)"
          }

          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $downloadFile

          if (Test-Path "mihomo-extract") {
            Remove-Item -Recurse -Force "mihomo-extract"
          }
          New-Item -ItemType Directory -Path "mihomo-extract" | Out-Null

          if ($downloadFile -like "*.zip") {
            Expand-Archive -Path $downloadFile -DestinationPath "mihomo-extract" -Force
          } else {
            $outExe = Join-Path (Resolve-Path "mihomo-extract").Path "mihomo.exe"
            $input = [System.IO.File]::OpenRead((Resolve-Path $downloadFile))
            try {
              $gzip = New-Object System.IO.Compression.GzipStream($input, [System.IO.Compression.CompressionMode]::Decompress)
              $output = [System.IO.File]::Create($outExe)
              try {
                $gzip.CopyTo($output)
              } finally {
                $output.Dispose()
                $gzip.Dispose()
              }
            } finally {
              $input.Dispose()
            }
          }

          $mihomoExe = Get-ChildItem -Path "mihomo-extract" -Recurse -File |
            Where-Object {
              $_.Extension -ieq ".exe" -and $_.Name -match '^mihomo.*\.exe$'
            } |
            Select-Object -First 1

          if (-not $mihomoExe) {
            $mihomoExe = Get-ChildItem -Path "mihomo-extract" -Recurse -File |
              Where-Object { $_.Extension -ieq ".exe" } |
              Select-Object -First 1
          }

          if (-not $mihomoExe) {
            Write-Host "Extracted files:"
            Get-ChildItem -Path "mihomo-extract" -Recurse | ForEach-Object { $_.FullName }
            throw "Downloaded Mihomo package does not contain any .exe file"
          }

          Copy-Item $mihomoExe.FullName "release-package\${{ matrix.mihomo_pack }}"
          Write-Host "Packed mihomo from $($mihomoExe.Name) -> release-package\${{ matrix.mihomo_pack }}"

      - name: Create zip package
        shell: pwsh
        run: |
          $zipName = "${{ steps.zipmeta.outputs.zip_name }}"
          if (Test-Path $zipName) {
            Remove-Item -Force $zipName
          }
          Compress-Archive -Path "release-package\*" -DestinationPath $zipName

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ steps.zipmeta.outputs.zip_name }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Show packaged files
        shell: bash
        run: find dist -type f -name "*.zip"

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
