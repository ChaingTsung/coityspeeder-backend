name: Build and Release Backend

on:
  push:
    tags:
      - 'v*' # 监听以 v 开头的 tag，例如 v1.0.0, v2.1.3
  workflow_dispatch: # 🌟 关键魔法：允许在 GitHub 网页上手动点击按钮触发！

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Backend Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      # 🌟 引入 Rust 缓存机制，极大加快后续版本的编译速度
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Backend (Release Mode)
        run: cargo build --release

      - name: Prepare Release Archive
        run: |
          echo "📦 准备打包后端发布文件..."
          # 我们依然保持外层叫 CoitySpeeder，里面放 backend，
          # 这样你解压后刚好可以把内核文件 (xray/mihomo) 放在 backend 的同级目录
          mkdir -p release_build/CoitySpeeder/backend
          
          # 拷贝编译好的 Rust 二进制文件
          cp target/release/coityspeeder release_build/CoitySpeeder/backend/
          
          # 赋予执行权限
          chmod +x release_build/CoitySpeeder/backend/coityspeeder
          
          # 打包压缩为 tar.gz
          cd release_build
          tar -czvf coityspeeder-backend-linux-amd64.tar.gz CoitySpeeder/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_build/coityspeeder-backend-linux-amd64.tar.gz
          generate_release_notes: true # 自动生成 release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
