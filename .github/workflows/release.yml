name: Build and Release Backend

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Release (${{ matrix.os_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      # 🌟 矩阵策略：同时在 Linux 和 Windows 环境下执行构建
      matrix:
        include:
          - os: ubuntu-latest
            os_name: linux
            xray_os: linux-64
            mihomo_os: linux-amd64
            bin_ext: ''
          - os: windows-latest
            os_name: windows
            xray_os: windows-64
            mihomo_os: windows-amd64
            bin_ext: '.exe'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install OpenSSL (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Backend (Release Mode)
        run: cargo build --release

      - name: 🔍 Check & Download Cores (Xray & Mihomo)
        # 统一使用 bash 终端以确保命令在 Windows/Linux 上表现一致
        shell: bash
        run: |
          echo "==== 检查内核文件是否存在 ===="
          
          # 1. 下载 Xray-core
          if [ ! -f "xray${{ matrix.bin_ext }}" ]; then
            echo "⬇️ 正在下载 Xray-core (${{ matrix.os_name }})..."
            curl -sL -o xray.zip "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-${{ matrix.xray_os }}.zip"
            # 从压缩包中只解压出可执行文件
            unzip -o xray.zip xray${{ matrix.bin_ext }}
            rm xray.zip
            chmod +x xray${{ matrix.bin_ext }} 2>/dev/null || true
          else
            echo "✅ xray${{ matrix.bin_ext }} 本地已存在，跳过下载"
          fi

          # 2. 下载 Mihomo (Prerelease-Alpha)
          if [ ! -f "mihomo${{ matrix.bin_ext }}" ]; then
            echo "⬇️ 正在获取 Mihomo Prerelease-Alpha 最新版本号..."
            MIHOMO_VER=$(curl -sL "https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/version.txt")
            echo "📌 当前 Alpha 版本: $MIHOMO_VER"
            
            if [ "${{ matrix.os_name }}" == "linux" ]; then
              # Linux 版是 .gz 格式
              curl -sL -o mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/mihomo-${{ matrix.mihomo_os }}-${MIHOMO_VER}.gz"
              gzip -d mihomo.gz
              chmod +x mihomo
            else
              # Windows 版是 .zip 格式
              curl -sL -o mihomo_win.zip "https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/mihomo-${{ matrix.mihomo_os }}-${MIHOMO_VER}.zip"
              unzip -o mihomo_win.zip
              # 解压出来的文件名带版本号，重命名为干净的 mihomo.exe
              mv mihomo-windows-amd64.exe mihomo.exe 2>/dev/null || mv mihomo-*.exe mihomo.exe
              rm mihomo_win.zip
            fi
          else
            echo "✅ mihomo${{ matrix.bin_ext }} 本地已存在，跳过下载"
          fi

      - name: 📦 Prepare Release Archive (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p release_build/CoitySpeeder/backend
          cp target/release/coityspeeder release_build/CoitySpeeder/backend/
          cp xray release_build/CoitySpeeder/
          cp mihomo release_build/CoitySpeeder/
          
          cd release_build
          tar -czvf coityspeeder-backend-linux-amd64.tar.gz CoitySpeeder/

      - name: 📦 Prepare Release Archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p release_build/CoitySpeeder/backend
          cp target/release/coityspeeder.exe release_build/CoitySpeeder/backend/
          cp xray.exe release_build/CoitySpeeder/
          cp mihomo.exe release_build/CoitySpeeder/
          
          cd release_build
          # Windows 下使用 7z 打包为 zip，对 Windows 用户更友好
          7z a coityspeeder-backend-windows-amd64.zip CoitySpeeder/

      - name: 🚀 Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 使用通配符，Linux传tar.gz，Windows传zip
          files: release_build/coityspeeder-backend-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
