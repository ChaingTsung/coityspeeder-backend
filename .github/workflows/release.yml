name: Build and Release Backend (Linux)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Linux Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🌟 1. 自动生成版本号 (兼容网页点击和推 Tag)
      - name: Generate Auto Version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            AUTO_VER="v$(date +'%Y.%m.%d')-run${{ github.run_number }}"
            echo "TAG_NAME=$AUTO_VER" >> $GITHUB_OUTPUT
          fi

      # 🌟 2. 安装 Rust 依赖
      - name: Install OpenSSL
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      # 🌟 3. 编译后端代码
      - name: Build Backend (Release Mode)
        run: cargo build --release

      # 🌟 4. 下载并解压 Linux 版的 Xray 与 Mihomo 内核
      - name: 🔍 Check & Download Cores
        run: |
          echo "==== 1. 准备 Xray 内核 ===="
          if [ ! -f "xray" ]; then
            curl -sL -o xray.zip "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip"
            unzip -o xray.zip xray
            rm xray.zip
            chmod +x xray
          fi

          echo "==== 2. 准备 Mihomo 内核 ===="
          if [ ! -f "mihomo" ]; then
            # 清除回车符，防止 404
            MIHOMO_VER=$(curl -sL "https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/version.txt" | tr -d '\r\n')
            echo "当前 Alpha 版本号: $MIHOMO_VER"
            
            curl -sL -o mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/mihomo-linux-amd64-${MIHOMO_VER}.gz"
            gzip -d mihomo.gz
            chmod +x mihomo
          fi

      # 🌟 5. 整理目录并打包为 tar.gz
      - name: 📦 Prepare Release Archive
        run: |
          mkdir -p release_build/CoitySpeeder/backend
          cp target/release/coityspeeder release_build/CoitySpeeder/backend/
          cp xray release_build/CoitySpeeder/
          cp mihomo release_build/CoitySpeeder/
          
          cd release_build
          tar -czvf coityspeeder-backend-linux-amd64.tar.gz CoitySpeeder/

      # 🌟 6. 在同一台机器上直接原地发布！
      - name: 🚀 Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG_NAME }}
          # 明确指定当前目录下的产物
          files: release_build/coityspeeder-backend-linux-amd64.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true # 找不到压缩包直接报错阻断！
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
